version: '3.8'

services:
  next-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - ./shared/:/app/shared/
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt/:/etc/letsencrypt/
    depends_on:
      - next-app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
